<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer PWA</title>
    <link rel="apple-touch-icon" href="[via.placeholder.com](https://via.placeholder.com/192/2e7d32/ffffff?text=T)">
    <style>
        body { font-family: -apple-system, sans-serif; background:#f5f5f5; margin:0; padding:15px; }
        .container { max-width:500px; margin:0 auto; background:white; padding:20px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.1); }
        header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        select { padding:8px; border-radius:5px; border:1px solid #ccc; width:150px; }
        .status { text-align:center; font-weight:bold; color:#2e7d32; margin-bottom:5px; }
        .table-header { display:flex; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px; font-size:.9em; }
        .row { display:flex; align-items:center; padding:4px 0; border-bottom:1px solid #f9f9f9; }
        .col-mecz { flex:3; font-size:.9em; }
        .col-wynik { flex:2; display:flex; justify-content:center; align-items:center; gap:4px; }
        .col-joker { flex:1; text-align:center; }
        input[type="number"] { width:35px; text-align:center; border:1px solid #ccc; border-radius:4px; padding:4px; }
        .user-section { margin-top:40px; margin-bottom:30px; }
        label { display:block; font-weight:bold; margin-bottom:10px; }
        .btn-send { width:100%; background:#2e7d32; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px; }
        .btn-send:disabled {background: #9e9e9e; cursor: not-allowed; opacity: .7;}
        .autocomplete { position:relative; width:100%; margin:10px 0 30px 0; }
        #playerName { width:100%; box-sizing:border-box; padding:12px 15px; font-size:16px; border:1px solid #ccc; border-radius:8px; outline:none; background:#fff; }
        #playerName:focus { border-color:#2e7d32; box-shadow:0 0 0 2px rgba(46,125,50,.15); }
        .autocomplete-items { position:absolute; top:calc(100% + 2px); left:0; right:0; background:#fff; border:1px solid #ccc; border-radius:8px; max-height:220px; overflow-y:auto; z-index:9999; display:none; box-shadow:0 4px 12px rgba(0,0,0,.15); }
        .autocomplete-item { padding:12px 15px; cursor:pointer; border-bottom:1px solid #eee; }
        .autocomplete-item:last-child { border-bottom:none; }
        .autocomplete-item:hover { background:#e8f5e9; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span style="font-weight: bold;">Etap:</span>
        <select id="stage">
            <option value="0">1/4 Finału</option>
            <option value="619158091">1/2 Finału</option>
            <option value="1775579869">Finały</option>
        </select>
    </header>

    <div id="status" class="status">ŁADOWANIE...</div>

    <div class="table-header">
        <div class="col-mecz">Mecz</div>
        <div class="col-wynik">Wynik</div>
        <div class="col-joker">Joker</div>
    </div>

    <div id="match-list"></div>

<div class="user-section">
    <label>Imię i Nazwisko:</label>
    <div class="autocomplete">
    <input
        type="text"
        id="playerName"
        placeholder="Zacznij pisać..."
        autocomplete="off">

    <div id="playersList" class="autocomplete-items"></div>
</div>
</div>


    <button id="sendBtn" class="btn-send" onclick="sendTypy()">WYŚLIJ TYPY</button>
</div>

<script>
    // --- KONFIGURACJA ---
    const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd7RZ5-PO-knXZfYohz6daMXryQTgJ27DJIHAUEBLiB6wT-s5lB_zraplf3K-RMuEWFX3lTx52vLcf/pub?output=csv";
    const scriptUrl = "https://script.google.com/macros/s/AKfycbx-AqNSfQKd1h4BDk4raw9h8oMSgHBk1gbcYsY8sz__Xmr_4MhPC2RQZV4zvD4GcWDycA/exec";
    const urlGracze = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd7RZ5-PO-knXZfYohz6daMXryQTgJ27DJIHAUEBLiB6wT-s5lB_zraplf3K-RMuEWFX3lTx52vLcf/pub?output=csv&gid=449826596";

    const statusDiv = document.getElementById('status');
    const stageSelect = document.getElementById('stage');
    const matchListDiv = document.getElementById('match-list');

    let players = [];
    const input = document.getElementById("playerName");
    const list = document.getElementById("playersList");

    async function loadData() {
        statusDiv.innerText = "ŁADOWANIE...";
        matchListDiv.innerHTML = "";
        const url = `${baseUrl}&gid=${stageSelect.value}&cache=${Date.now()}`;

        try {
            const response = await fetch(url);
            const text = await response.text();
            const lines = text.split('\n').map(l => l.replace(/"/g, '').trim()).filter(l => l !== "");
            
            lines.forEach((line, index) => {
                const cells = line.split(',');
                const nrMeczu = cells[0] || (index + 1);
                const t1 = cells[1] || "Drugzyna A";
                const t2 = cells[2] || "Drugzyna B";

                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `
                    <div class="col-mecz" data-t1="${t1}" data-t2="${t2}" data-nr="${nrMeczu}">
                        ${nrMeczu}: ${t1} - ${t2}
                    </div>
                    <div class="col-wynik">
                        <input type="number" class="g1" placeholder="0">
                        <span>:</span>
                        <input type="number" class="g2" placeholder="0">
                    </div>
                    <div class="col-joker">
                        <input type="radio" name="joker" value="${index}">
                    </div>
                `;
                matchListDiv.appendChild(row);
            });
            statusDiv.innerText = "TYPOWANIE";
        } catch (error) {
            statusDiv.innerText = "BŁĄD SIECI";
        }
    }

async function loadPlayers() {
    try {
        const response = await fetch(urlGracze);
        if (!response.ok) {throw new Error(`HTTP ${response.status}`);}

        const text = await response.text();
        players = [...new Set(
            text
                .replace(/^\uFEFF/, "")
                .split(/\r?\n/)
                .map(row => row.split(",")[0].trim().replace(/"/g, ""))
                .filter(name => name && name.toLowerCase() !== "nazwisko")
        )];

        console.log("Pobrano graczy:", players.length);

    } catch (error) {console.error("Błąd listy graczy:", error);}
}
    
input.addEventListener("input", function () {
    const value = this.value.toLowerCase();
    list.innerHTML = "";
    if (value === "") {list.style.display = "none"; return;}

    const found = players
        .filter(name => name.toLowerCase().includes(value))
        .slice(0, 10);

    found.forEach(name => {
        const div = document.createElement("div");
        div.className = "autocomplete-item";
        div.textContent = name;

        div.onclick = function () {
            input.value = name;
            list.style.display = "none";
        };
        list.appendChild(div);
    });
    list.style.display = found.length ? "block" : "none";
});

document.addEventListener("click", function (e) {
    if (!e.target.closest(".autocomplete")) {
        list.style.display = "none";
    }
});

input.addEventListener("blur", function () {
    if (this.value && !players.includes(this.value)) {
        alert("Wybierz nazwisko z listy.");
        this.value = "";
    }
}); */
    
async function sendTypy() {
        const name = document.getElementById('playerName').value.trim();
        const stageText = stageSelect.options[stageSelect.selectedIndex].text;
        const jokerRadio = document.querySelector('input[name="joker"]:checked');

        if (!name || !jokerRadio) return alert("Podaj imię i zaznacz Jokera!");
        if (!players.includes(name)) {
                alert("Wybierz swoje imię i nazwisko z listy");
                document.getElementById("playerName").focus();
                return;
                }
        
            const button = document.getElementById("sendBtn");
            button.disabled = true;
            button.innerText = "WYSYŁANIE...";
        
        statusDiv.innerText = "WYSYŁANIE...";
        const typyDanych = [];
        const rows = document.querySelectorAll('.row');
        
        rows.forEach((row, index) => {
            const el = row.querySelector('.col-mecz');
            const g1 = row.querySelector('.g1').value || "0";
            const g2 = row.querySelector('.g2').value || "0";
            
            typyDanych.push({ 
                nr: el.getAttribute('data-nr'), 
                druzyna: el.getAttribute('data-t1'), 
                gole: g1, 
                joker: (jokerRadio.value == index ? "joker" : "") 
            });
            typyDanych.push({ 
                nr: el.getAttribute('data-nr'), 
                druzyna: el.getAttribute('data-t2'), 
                gole: g2, 
                joker: "" 
            });
        });

        const payload = { user: name, etap: stageText, typy: typyDanych };

        try {
            await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Typy zostały zapisane!");
            button.innerText = "WYSŁANE";
            document.getElementById('playerName').value = "";
            loadData();
        } catch (error) {
            alert("Wystąpił błąd!");
                button.disabled = false;
                button.innerText = "WYŚLIJ TYPY";
            statusDiv.innerText = "BŁĄD";
        }
    }
    stageSelect.value = "619158091";
    stageSelect.addEventListener('change', loadData);
    loadData();
    loadPlayers();
</script>

</body>
</html>
